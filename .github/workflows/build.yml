name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npx @electron/packager . "قلم" --platform=win32 --arch=x64 --icon=logo.ico --out=release --overwrite --asar
      - uses: actions/upload-artifact@v4
        with:
          name: qalam-windows
          path: release/قلم-win32-x64/
      - run: cd release; Compress-Archive -Path قلم-win32-x64/* -DestinationPath qalam-windows.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: qalam-windows-zip
          path: release/qalam-windows.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: npm install
      - run: npm install -g @capacitor/cli
      - run: npm run build:www
      - run: npx cap add android
      - run: npx cap copy android
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: qalam-android
          path: android/app/build/outputs/apk/debug/

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: qalam-windows-zip
          path: release-assets/
      - uses: actions/download-artifact@v4
        with:
          name: qalam-android
          path: release-assets/
      - run: ls -la release-assets/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: قلم v${{ github.run_number }}
          body: |
            بناء تلقائي من commit ${{ github.sha }}
            - 🪟 Windows: qalam-windows.zip
            - 📱 Android: qalam-android.apk
          files: release-assets/*
