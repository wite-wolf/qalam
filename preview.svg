<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f13"/>
      <stop offset="100%" stop-color="#1a1a24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#00d68f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Top toolbar -->
  <rect x="0" y="0" width="800" height="42" fill="#0f0f13" opacity="0.9"/>
  <rect x="0" y="41" width="800" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="16" y="27" font-family="sans-serif" font-size="13" font-weight="bold" fill="#6c5ce7">قلم</text>

  <!-- Canvas area -->
  <rect x="0" y="42" width="800" height="416" fill="#f0f2f5"/>
  
  <!-- Drawing on canvas - a house -->
  <rect x="300" y="200" width="200" height="150" fill="none" stroke="#6c5ce7" stroke-width="3" rx="4"/>
  <polygon points="260,200 400,120 540,200" fill="none" stroke="#6c5ce7" stroke-width="3"/>
  <rect x="370" y="270" width="60" height="80" fill="none" stroke="#1d4ed8" stroke-width="2"/>
  <circle cx="360" cy="240" r="20" fill="none" stroke="#dc2626" stroke-width="2"/>
  <text x="312" y="390" font-family="sans-serif" font-size="11" fill="#64748b">B</text>
  
  <!-- Connect nodes (mind map style) -->
  <circle cx="120" cy="120" r="24" fill="rgba(108,92,231,0.2)" stroke="#6c5ce7" stroke-width="2"/>
  <text x="120" y="125" font-family="sans-serif" font-size="11" fill="#6c5ce7" text-anchor="middle" font-weight="bold">فكرة</text>
  <circle cx="200" cy="200" r="20" fill="rgba(0,214,143,0.2)" stroke="#00d68f" stroke-width="2"/>
  <text x="200" y="205" font-family="sans-serif" font-size="10" fill="#00d68f" text-anchor="middle" font-weight="bold">شرح</text>
  <circle cx="600" cy="150" r="22" fill="rgba(255,107,107,0.2)" stroke="#ff6b6b" stroke-width="2"/>
  <text x="600" y="155" font-family="sans-serif" font-size="10" fill="#ff6b6b" text-anchor="middle" font-weight="bold">تصميم</text>
  <line x1="140" y1="138" x2="185" y2="190" stroke="rgba(108,92,231,0.4)" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="200" y1="218" x2="210" y2="280" stroke="rgba(0,214,143,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Toolbar icons at bottom -->
  <rect x="0" y="458" width="800" height="42" fill="#0f0f13" opacity="0.9"/>
  <rect x="0" y="458" width="800" height="1" fill="rgba(255,255,255,0.06)"/>
  
  <!-- Tool icons -->
  <circle cx="30" cy="479" r="4" fill="#6c5ce7"/>
  <circle cx="50" cy="479" r="4" fill="#1d4ed8"/>
  <circle cx="70" cy="479" r="4" fill="#dc2626"/>
  <circle cx="90" cy="479" r="4" fill="#059669"/>
  <circle cx="110" cy="479" r="4" fill="#d97706"/>
  
  <rect x="130" y="473" width="60" height="2" fill="#334155"/>
  <rect x="130" y="477" width="40" height="2" fill="#334155"/>
  
  <text x="760" y="484" font-family="sans-serif" font-size="10" fill="#64748b">جاهز</text>
  
  <!-- Watermark -->
  <text x="400" y="470" font-family="sans-serif" font-size="11" fill="#334155" text-anchor="middle">wite wolf</text>
</svg>
